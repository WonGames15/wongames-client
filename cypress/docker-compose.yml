services:
  api:
    container_name: wongames_api
    image: matheus1501/api:latest
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: wongames
      DATABASE_PASSWORD: wongames123
      DATABASE_NAME: wongames
      STRIPE_KEY: ${STRIPE_KEY}
      SEED: ${SEED:-false} # false por padrão, só roda se passar SEED=true
    ports:
      - '1337:1337'
    depends_on:
      db:
        condition: service_healthy # aguarda o postgres estar pronto de verdade

  db:
    container_name: wongames_db
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_USER: wongames
      POSTGRES_PASSWORD: wongames123
      POSTGRES_DB: wongames
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wongames -d wongames']
      interval: 5s
      timeout: 5s
      retries: 10

name: End to End
