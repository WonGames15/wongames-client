version: '3'

services:
  api:
    container_name: wongames_api
    image: matheus1501/api:latest
    env_file: ../.env.local
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi123
      DATABASE_NAME: strapi
      STRIPE_KEY: ${STRIPE_KEY}
    ports:
      - '1337:1337'
    depends_on:
      - db

  db:
    container_name: wongames_db
    image: matheus1501/database:latest
    ports:
      - '5432:5432'
