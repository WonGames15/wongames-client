name: End to End

on:
  pull_request:

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
      SEED: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build the stack
        run: docker compose -f ./cypress/docker-compose.yml up -d

      - name: Stream API logs
        run: |
          docker logs -f -t wongames_api > api.log 2>&1 &

      - name: Waiting Strapi Server
        run: |
          docker run --rm \
            --network container:wongames_api \
            jwilder/dockerize \
            -wait http://localhost:1337/admin \
            -timeout 120s \
            -wait-retry-interval 5s

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Cypress
        run: npm run test:e2e:ci

      - name: Show Full API Logs
        if: always()
        run: |
          echo "================ FULL API LOGS ================"
          cat api.log

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
