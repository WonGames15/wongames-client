name: End to End

on:
  pull_request:

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
      SEED: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build the stack
        run: docker compose -f ./cypress/docker-compose.yml up -d

      - name: Show API logs
        if: always() # mostra mesmo se o CI falhar
        run: docker logs wongames_api

      - name: Wait for containers stabilize
        run: sleep 10

      - name: Full API debug
        if: always()
        run: |
          echo "================ DOCKER PS ================"
          docker ps -a

          echo "================ API INSPECT ================"
          docker inspect wongames_api

          echo "================ API LOGS LIVE ================"
          docker logs wongames_api

          echo "================ API LAST 1000 LINES ================"
          docker logs --tail 1000 wongames_api

          echo "================ API ENV ================"
          docker exec wongames_api env || true

          echo "================ API FILES ================"
          docker exec wongames_api ls -R /opt/app/dist/scripts || true

          echo "================ API SEED FILE CONTENT ================"
          docker exec wongames_api sh -c "cat /opt/app/dist/scripts/seed/games.js | head -200" || true

      - name: Show Docker Logs
        run: docker compose -f ./cypress/docker-compose.yml logs

      - name: Debug containers
        run: |
          docker ps
          docker logs wongames_api || true

      - name: Inspect API container
        run: |
          docker inspect wongames_api || true

      - name: Waiting Strapi Server
        run: |
          docker run --rm \
            --network container:wongames_api \
            jwilder/dockerize \
            -wait http://localhost:1337/admin \
            -timeout 120s \
            -wait-retry-interval 5s

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Cypress
        run: npm run test:e2e:ci

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
